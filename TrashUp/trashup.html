<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쓰레기 쌓기</title>

    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="./trashup.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <img
            src="../assets/images/바나나 흑백.png"
            alt="Banana Logo"
            class="logo-img"
          />
        </a>
      </div>

      <div class="nav-center">
        <div class="nav-menu">
          <a href="../index.html#intro-start" class="nav-item">
            <span class="item-text">소개</span>
          </a>
          <a href="../TrashCatch/trashcatch.html" class="nav-item">
            <span class="item-text">쓰레기 담기</span>
          </a>
          <a href="../TrashRun/trashrun.html" class="nav-item">
            <span class="item-text">쓰레기 런</span>
          </a>
          <a href="./trashup.html" class="nav-item active">
            <span class="item-text">쓰레기 쌓기</span>
          </a>
          <a href="../Setting/setting.html" class="nav-item">
            <span class="item-text">설정</span>
          </a>
        </div>
      </div>

      <div class="nav-right"></div>
    </nav>

    <div id="image-preload-cache" style="display: none">
      <!-- <img id="img-tissue" src="../assets/images/trashup/tissue.png" /> -->
      <img id="img-chopsticks" src="../assets/images/chopsticks.png" />
      <img id="img-butt" src="../assets/images/butt.png" />
      <img id="img-card" src="../assets/images/당일 대출 명함_웹 게임.png" />
      <img id="img-snack" src="../assets/images/쓰레기쌓기_라면당.png" />
      <img id="img-cundition" src="../assets/images/trash-catch-02.png" />
      <img id="img-welchs" src="../assets/images/welchs.png" />
      <img id="img-bottle" src="../assets/images/bottle.png" />
    </div>

    <main class="game-page trashup-page">
      <div class="game-layout">
        <a
          href="../TrashRun/trashrun.html"
          class="game-side-arrow"
          aria-label="이전 게임"
        >
          ‹
        </a>

        <div class="game-center">
          <div class="game-wrapper">
            <div class="game-title">Game 3 : 분리수거 실패 현장</div>

            <div id="game-container">
              <div id="hud" style="display: none">
                <div class="score-box" id="score-text">Score: 000000</div>
                <div class="controls">
                  <span id="sound-btn">🔊</span>
                  <span id="pause-btn">⏸</span>
                </div>
              </div>

              <div id="start-screen" class="ui-panel">
                <p class="start-guide">마우스로 클릭해 쓰레기를 쌓으세요</p>
                <p class="start-click" id="loading-text">[ 클릭하여 게임 시작하기 ]</p>
              </div>

              <div id="pause-screen" class="ui-panel" style="display: none">
                <p class="game-over-title">일시정지</p>
                <p class="game-over-click" id="resume-btn">[ 클릭하여 계속하기 ]</p>
              </div>

              <div id="game-over-screen" class="ui-panel" style="display: none">
                <p class="game-over-title">게임 오버</p>
                <p id="final-score" class="game-over-score">Score: 000000</p>
                <p class="game-over-click">[ 클릭하여 다시시작하기 ]</p>
              </div>

              <canvas id="gameCanvas" width="450" height="650"></canvas>
            </div>
          </div>

          <div class="game-page-dots">
            <span class="game-page-dot"></span>
            <span class="game-page-dot"></span>
            <span class="game-page-dot active"></span>
          </div>
        </div>

        <a
          href="../TrashCatch/trashcatch.html"
          class="game-side-arrow"
          aria-label="다음 게임"
        >
          ›
        </a>
      </div>
    </main>

    <script src="../js/audioManager.js"></script>
    <script src="./trashup.js"></script>
  </body>
</html>
