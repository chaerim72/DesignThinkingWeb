<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>설정</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="./setting.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <img
            src="../assets/images/바나나 흑백.png"
            alt="Banana Logo"
            class="logo-img"
          />
        </a>
      </div>

      <div class="nav-center">
        <div class="nav-menu">
          <a href="../index.html#intro-start" class="nav-item">
            <span class="item-text">소개</span>
          </a>

          <a href="../TrashCatch/trashcatch.html" class="nav-item">
            <span class="item-text">쓰레기 담기</span>
          </a>

          <a href="../TrashRun/trashrun.html" class="nav-item">
            <span class="item-text">쓰레기 런</span>
          </a>

          <a href="../TrashUp/trashup.html" class="nav-item">
            <span class="item-text">쓰레기 쌓기</span>
          </a>

          <a href="./setting.html" class="nav-item active">
            <span class="item-text">설정</span>
          </a>
        </div>
      </div>

      <div class="nav-right"></div>
    </nav>

    <main class="setting-page">
      <section class="setting-container">
        <h1 class="setting-title">설정</h1>

        <section class="setting-section">
          <h2 class="setting-section-title">오디오 설정</h2>

          <div class="control-group">
            <label for="master-volume">배경음</label>

            <input
              type="range"
              id="master-volume"
              class="setting-slider"
              min="0"
              max="100"
              value="30"
            />

            <span id="master-value-text" class="value-text">30%</span>
          </div>

          <div class="control-group">
            <label for="effect-volume">효과음</label>

            <input
              type="range"
              id="effect-volume"
              class="setting-slider"
              min="0"
              max="100"
              value="30"
            />

            <span id="effect-value-text" class="value-text">30%</span>
          </div>
        </section>

        <section class="setting-section">
          <h2 class="setting-section-title">화면 모드 설정</h2>

          <div class="control-group dark-control-group">
            <label for="dark-mode-toggle" class="dark-label">
              다크모드 활성화
            </label>

            <label class="switch">
              <input type="checkbox" id="dark-mode-toggle" />
              <span class="slider-round"></span>
            </label>
          </div>
        </section>
      </section>
    </main>

    <script src="../js/audioManager.js"></script>
    <script src="./setting.js"></script>
  </body>
</html>
